<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - CareBridge</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f8fafc; padding: 2rem; }
        .card { max-width: 460px; margin: 3rem auto; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.5rem; }
        h2 { margin-bottom: 0.8rem; color: #0f172a; }
        p { color: #475569; margin-bottom: 1rem; }
        input { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; margin: 0.5rem 0 1rem; }
        button { background: #0284c7; color: #fff; border: none; padding: 0.75rem 1rem; border-radius: 8px; cursor: pointer; font-weight: 600; }
        ul.errorlist { list-style: none; color: #b91c1c; background: #fee2e2; border-radius: 6px; padding: 0.5rem; }
        a { color: #0284c7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Set a new password</h2>
        {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Update password</button>
        </form>
        {% else %}
        <p>This reset link is invalid or expired. Please request a new one.</p>
        <p><a href="/password-reset/">Request new reset link</a></p>
        {% endif %}
    </div>
</body>
</html>
