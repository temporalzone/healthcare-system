<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Parent - CareBridge</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .form-container { width: 100%; max-width: 500px; }

        .form-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .form-header { text-align: center; margin-bottom: 2rem; }
        
        .form-icon { font-size: 3rem; color: var(--primary); margin-bottom: 1rem; }

        .form-title { font-size: 1.5rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem; }

        /* Django form typography styling */
        form p { margin-bottom: 1.25rem; display: flex; flex-direction: column; }
        form label { font-size: 0.9rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.4rem; }
        form input, form select, form textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--card-bg);
            outline: none;
            font-size: 0.95rem;
            transition: all 0.2s;
            color: var(--text-main);
            font-family: inherit;
        }
        form textarea { resize: vertical; min-height: 100px; }
        form input:focus, form select:focus, form textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .helptext { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.4rem; }
        ul.errorlist { color: #ef4444; font-size: 0.8rem; list-style: none; margin-bottom: 1rem; padding: 0; background: #fee2e2; padding: 0.5rem; border-radius: 6px; }

        .btn-submit {
            width: 100%;
            padding: 0.85rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-submit:hover { background-color: var(--primary-hover); transform: translateY(-1px); }

        .form-footer { text-align: center; margin-top: 1.5rem; }
        .form-footer a {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .form-footer a:hover { color: var(--text-main); }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <i class="fa-solid fa-user-pen form-icon"></i>
                <h2 class="form-title">Edit Parent</h2>
                <p style="color: var(--text-muted); font-size: 0.95rem;">Update the parent's health profile and details.</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-save"></i> Update Parent
                </button>
            </form>

            <div class="form-footer">
                <a href="/"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>
</html>
