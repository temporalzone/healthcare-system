<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - CareBridge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            color: var(--text-main);
            padding: 2rem;
        }

        .card {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 2rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p.sub {
            color: var(--text-muted);
            margin-bottom: 1.25rem;
            font-size: 0.95rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
            letter-spacing: 0.2rem;
            text-align: center;
        }

        .row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #e2e8f0;
            color: #0f172a;
        }

        ul.errorlist {
            list-style: none;
            margin-bottom: 0.75rem;
            color: #b91c1c;
            font-size: 0.85rem;
            background: #fee2e2;
            border-radius: 6px;
            padding: 0.5rem;
        }

        .messages {
            margin-bottom: 1rem;
        }

        .msg {
            margin-bottom: 0.5rem;
            padding: 0.7rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .msg.error {
            background: #fee2e2;
            color: #b91c1c;
        }

        .msg.success {
            background: #dcfce7;
            color: #166534;
        }

        .timer-row {
            margin-bottom: 0.9rem;
            font-size: 0.88rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            gap: 1rem;
        }

        .timer-pill {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 999px;
            padding: 0.35rem 0.65rem;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Verify your email</h1>
        <p class="sub">Enter the 6-digit OTP sent to <strong>{{ email }}</strong>.</p>

        <div class="timer-row">
            <span id="otpExpiry" class="timer-pill">OTP expires in --:--</span>
            <span id="resendCooldown" class="timer-pill">Resend available now</span>
        </div>

        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="msg {% if message.tags == 'error' %}error{% else %}success{% endif %}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="row">
                <button class="btn-primary" type="submit" name="action" value="verify">Verify OTP</button>
                <button id="resendBtn" class="btn-secondary" type="submit" name="action" value="resend">Resend OTP</button>
            </div>
        </form>
    </div>

    <script>
        const otpExpiresAtRaw = "{{ otp_expires_at|default_if_none:'' }}";
        const resendAvailableAtRaw = "{{ resend_available_at|default_if_none:'' }}";
        const otpExpiresAt = otpExpiresAtRaw ? Number(otpExpiresAtRaw) : null;
        const resendAvailableAt = resendAvailableAtRaw ? Number(resendAvailableAtRaw) : null;
        const otpExpiryEl = document.getElementById('otpExpiry');
        const resendCooldownEl = document.getElementById('resendCooldown');
        const resendBtn = document.getElementById('resendBtn');

        function formatTime(secondsLeft) {
            const mins = Math.floor(secondsLeft / 60);
            const secs = secondsLeft % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function tickTimers() {
            const now = Math.floor(Date.now() / 1000);

            if (otpExpiresAt) {
                const otpLeft = otpExpiresAt - now;
                if (otpLeft > 0) {
                    otpExpiryEl.textContent = `OTP expires in ${formatTime(otpLeft)}`;
                } else {
                    otpExpiryEl.textContent = 'OTP expired, resend required';
                }
            }

            if (resendAvailableAt) {
                const resendLeft = resendAvailableAt - now;
                if (resendLeft > 0) {
                    resendCooldownEl.textContent = `Resend in ${formatTime(resendLeft)}`;
                    resendBtn.disabled = true;
                    resendBtn.style.opacity = '0.6';
                    resendBtn.style.cursor = 'not-allowed';
                } else {
                    resendCooldownEl.textContent = 'Resend available now';
                    resendBtn.disabled = false;
                    resendBtn.style.opacity = '1';
                    resendBtn.style.cursor = 'pointer';
                }
            }
        }

        tickTimers();
        setInterval(tickTimers, 1000);
    </script>
</body>
</html>
